<div class="roles-container">
  <div class="header">
    <h1 class="mat-h1">Gestión de Roles</h1>
  </div>

  <mat-card class="form-card">
    <mat-card-header>
      <mat-card-title>{{ editingRoleId ? 'Editar Rol' : 'Nuevo Rol' }}</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="roleForm" (ngSubmit)="saveRole()" class="role-form">
        <mat-form-field appearance="fill">
          <mat-label>ID de Rol</mat-label>
          <input matInput formControlName="RoleID" placeholder="Ej: ROL_ADMIN" />
        </mat-form-field>

        <mat-form-field appearance="fill">
          <mat-label>Valor de Rol</mat-label>
          <input matInput formControlName="RoleValue" placeholder="Ej: Admin" />
        </mat-form-field>

        <mat-form-field appearance="fill" class="full-width">
          <mat-label>Descripción</mat-label>
          <input matInput formControlName="RoleDescription" placeholder="Ej: Administrador del sistema" />
        </mat-form-field>

        <mat-form-field appearance="fill" class="full-width">
          <mat-label>Permisos</mat-label>
          <mat-select formControlName="permissions" multiple [compareWith]="comparePermissions">
            <mat-option *ngFor="let permission of permissions$ | async" [value]="permission">
              {{ permission.NombrePermiso }}
            </mat-option>
          </mat-select>
        </mat-form-field>

        <div class="form-actions">
          <button mat-button type="button" (click)="cancelEdit()" *ngIf="editingRoleId">Cancelar</button>
          <button mat-raised-button color="primary" type="submit">Guardar</button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>

  <mat-card>
    <table mat-table [dataSource]="(roles$ | async) || []" class="mat-elevation-z8">
      <ng-container matColumnDef="RoleID">
        <th mat-header-cell *matHeaderCellDef> ID </th>
        <td mat-cell *matCellDef="let element"> {{element.id}} </td>
      </ng-container>

      <ng-container matColumnDef="RoleValue">
        <th mat-header-cell *matHeaderCellDef> Valor </th>
        <td mat-cell *matCellDef="let element"> {{element.RoleValue}} </td>
      </ng-container>

      <ng-container matColumnDef="RoleDescription">
        <th mat-header-cell *matHeaderCellDef> Descripción </th>
        <td mat-cell *matCellDef="let element"> {{element.RoleDescription}} </td>
      </ng-container>

      <ng-container matColumnDef="Acciones">
        <th mat-header-cell *matHeaderCellDef> Acciones </th>
        <td mat-cell *matCellDef="let element">
          <button mat-icon-button color="accent" (click)="editRole(element)" type="button">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="deleteRole(element)" type="button">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <!-- Placeholder when empty -->
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="4">No se encontraron roles</td>
      </tr>
    </table>
  </mat-card>
</div>

<div class="login-container">
    <mat-card class="login-card" style="max-width: 400px; margin: 10vh auto; padding: 1rem;">
        <img src="/images/logo.png" alt="Logo" style="width: 150px; height: 150px; align-self: center;" />
        <mat-card-header style="display: flex; justify-content: center; align-items: center; margin-bottom: 1rem;">
            <mat-card-title>Inicio de Sesión</mat-card-title>
        </mat-card-header>
        <mat-card-content>
            <form (ngSubmit)="onSubmit()" style="text-align: center; width: 100%;">
                <mat-form-field class="full-width">
                    <mat-label>Usuario</mat-label>
                    <input matInput type="text" [(ngModel)]="user" name="user" required>
                </mat-form-field>
                <mat-form-field class="full-width">
                    <mat-label>Contraseña</mat-label>
                    <input matInput type="password" [(ngModel)]="password" name="password" required>
                </mat-form-field>
                <button mat-raised-button color="primary" type="submit">Iniciar Sesión</button>
                <div style="text-align: center; margin-top: 15px;">
                    <a routerLink="/register"
                        style="color: #3f51b5; text-decoration: none; font-weight: 500; margin-bottom: 5px;">¿No
                        tienes cuenta?
                        <button mat-raised-button color="primary" type="button">Registrarse</button>
                    </a>
                </div>
            </form>

        </mat-card-content>
    </mat-card>
</div>
